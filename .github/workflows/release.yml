name: Trigger release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to check out and release'
        required: true
        type: string
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    timeout-minutes: 20
    if: |
      ${{
        github.repository == 'flathub-infra/flatpak-builder-lint' && (
          (github.event_name == 'workflow_dispatch') ||
          (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/master')
        )
      }}
    steps:
        # 6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.commit || 'master' }}

      - name: Check last commit message
        id: check_commit
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif git log -1 --pretty=%B | grep -E "\[release\]"; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if docker-manifest succeeded
        if: steps.check_commit.outputs.is_release == 'true'
        id: check_job
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            job_status=$(gh run view ${{ github.event.workflow_run.id }} --json jobs --jq '.jobs[] | select(.name=="docker-call / docker-manifest") | .conclusion')
            echo "Status: $job_status"
            if [ "$job_status" == "success" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delay for 2 minutes
        if: steps.check_job.outputs.run == 'true' && github.event_name != 'workflow_dispatch'
        run: sleep 120

      - name: Trigger workflow in org.flatpak.Builder repository
        if: steps.check_job.outputs.run == 'true'
        # 4.0.1
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          repository: flathub/org.flatpak.Builder
          event-type: trigger-workflow
          client-payload: "{\"sha\": \"${{ github.event_name == 'workflow_dispatch' && inputs.commit || github.sha }}\"}"
          token: ${{ secrets.LINTER_TRIGGER_WORKFLOW_TOKEN }}

      - name: Trigger workflow in flathub-infra/actions-images
        if: steps.check_job.outputs.run == 'true'
        # 4.0.1
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
        with:
          repository: flathub-infra/actions-images
          event-type: trigger-workflow
          token: ${{ secrets.LINTER_TRIGGER_WORKFLOW_TOKEN }}
